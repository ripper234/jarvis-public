<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ron.build 🏗️</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Blog-specific styles */
    body {
      direction: rtl;
      text-align: right;
    }

    .blog-header {
      text-align: center;
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .blog-header h1 {
      font-size: 2.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .blog-header .author {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      color: var(--foreground);
      opacity: 0.9;
      margin-bottom: 0.25rem;
    }

    .blog-header .tagline {
      font-size: 1.05rem;
      color: var(--foreground);
      opacity: 0.6;
      font-style: italic;
    }

    .blog-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      font-size: 0.875rem;
    }

    .blog-nav a {
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .blog-posts {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .blog-post {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.25rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition-normal);
    }

    .blog-post:hover {
      box-shadow: var(--shadow-md);
    }

    .post-date {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      font-family: var(--font-heading);
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }

    .post-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .post-tldr {
      font-size: 1rem;
      color: var(--primary);
      opacity: 0.85;
      font-weight: 500;
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .post-content {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--foreground);
      opacity: 0.85;
    }

    .post-content p {
      margin-bottom: 1rem;
      opacity: 1;
    }

    .post-content p:last-child {
      margin-bottom: 0;
    }

    .post-content strong {
      color: var(--foreground);
      font-weight: 700;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(8, 145, 178, 0.3);
      text-underline-offset: 3px;
      transition: text-decoration-color var(--transition-fast);
      word-break: break-all;
    }

    .post-content a:hover {
      text-decoration-color: var(--accent);
    }

    .post-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .blog-loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--foreground);
      opacity: 0.5;
      font-size: 1.1rem;
    }

    .blog-loading .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .blog-error {
      text-align: center;
      padding: 3rem;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 12px;
      color: #991B1B;
      max-width: 720px;
      margin: 0 auto;
    }

    .blog-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
      color: var(--foreground);
      opacity: 0.45;
    }

    .last-updated {
      font-size: 0.8rem;
      color: var(--foreground);
      opacity: 0.4;
      text-align: center;
      margin-top: 0.75rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .blog-header h1 {
        font-size: 2.25rem;
      }

      .blog-post {
        padding: 1.5rem 1.25rem;
      }

      .post-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="blog-nav">
      <a href="https://jarvis.ripper234.com">→ jarvis.ripper234.com</a>
      <span class="last-updated" id="lastUpdated"></span>
    </nav>

    <header class="blog-header">
      <h1>ron.build 🏗️</h1>
      <div class="author">רון גרוס | Ron Gross</div>
      <div class="tagline">בלוג על בנייה עם AI</div>
    </header>

    <main id="blogPosts">
      <div class="blog-loading" id="loadingIndicator">
        <div class="spinner"></div>
        <div>טוען פוסטים...</div>
      </div>
    </main>

    <footer class="blog-footer">
      <div>ron.build — נבנה עם AI ❤️</div>
    </footer>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/1x3njEmv5_Zo92w_nH-1s75m4xzLJ_DGxBDxs2-REtPY/gviz/tq?tqx=out:csv&gid=0';

    function parseCSV(text) {
      const rows = [];
      let current = '';
      let inQuotes = false;
      let row = [];

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            current += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            row.push(current);
            current = '';
          } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
            row.push(current);
            current = '';
            if (row.some(cell => cell.trim())) rows.push(row);
            row = [];
            if (ch === '\r') i++;
          } else {
            current += ch;
          }
        }
      }
      // last row
      if (current || row.length) {
        row.push(current);
        if (row.some(cell => cell.trim())) rows.push(row);
      }
      return rows;
    }

    function formatDate(dateStr) {
      // "6.3.26" → "6 במרץ 2026"
      const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
      const parts = dateStr.trim().split('.');
      if (parts.length < 3) return dateStr;
      const day = parseInt(parts[0]);
      const month = parseInt(parts[1]) - 1;
      const year = 2000 + parseInt(parts[2]);
      if (isNaN(day) || isNaN(month) || isNaN(year) || month < 0 || month > 11) return dateStr;
      return `${day} ב${months[month]} ${year}`;
    }

    function parseDateForSort(dateStr) {
      const parts = dateStr.trim().split('.');
      if (parts.length < 3) return 0;
      const day = parseInt(parts[0]);
      const month = parseInt(parts[1]);
      const year = 2000 + parseInt(parts[2]);
      return new Date(year, month - 1, day).getTime();
    }

    function formatContent(text) {
      if (!text) return '';

      // Split into paragraphs on double newlines or single newlines
      let html = text
        // Handle horizontal rules (line that is just "-" or "---" etc)
        .replace(/\n\s*-\s*\n/g, '\n<hr>\n')
        // Convert *text* to bold (but not ** which would be empty)
        .replace(/\*([^*]+)\*/g, '<strong>$1</strong>')
        // Convert URLs to links
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
        // Convert newlines to paragraphs
        .split(/\n\n+/)
        .map(para => {
          para = para.trim();
          if (!para) return '';
          if (para === '<hr>') return '<hr>';
          // Handle single newlines within a paragraph
          para = para.replace(/\n/g, '<br>');
          return `<p>${para}</p>`;
        })
        .filter(Boolean)
        .join('\n');

      return html;
    }

    async function loadBlog() {
      const container = document.getElementById('blogPosts');
      const loading = document.getElementById('loadingIndicator');

      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error('Failed to fetch');
        const text = await response.text();
        const rows = parseCSV(text);

        // First row is headers
        if (rows.length < 2) {
          container.innerHTML = '<div class="blog-error">אין פוסטים עדיין 🤷</div>';
          return;
        }

        // Parse posts (skip header row)
        const posts = rows.slice(1)
          .map(row => ({
            num: row[0] || '',
            date: row[1] || '',
            title: row[2] || '',
            tldr: row[3] || '',
            content: row[4] || ''
          }))
          .filter(p => p.content.trim())
          // Sort by date descending (most recent first)
          .sort((a, b) => parseDateForSort(b.date) - parseDateForSort(a.date));

        if (posts.length === 0) {
          container.innerHTML = '<div class="blog-error">אין פוסטים עדיין 🤷</div>';
          return;
        }

        const postsHTML = posts.map((post, i) => `
          <article class="blog-post fade-in" style="transition-delay: ${i * 0.1}s">
            <div class="post-date">${formatDate(post.date)}</div>
            <h2 class="post-title">${escapeHTML(post.title)}</h2>
            ${post.tldr ? `<div class="post-tldr">${escapeHTML(post.tldr)}</div>` : ''}
            <div class="post-content">${formatContent(post.content)}</div>
          </article>
        `).join('');

        container.innerHTML = `<div class="blog-posts">${postsHTML}</div>`;

        // Update timestamp
        const now = new Date();
        document.getElementById('lastUpdated').textContent =
          `עודכן: ${now.toLocaleDateString('he-IL')} ${now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}`;

        // Trigger fade-in animations
        requestAnimationFrame(() => {
          document.querySelectorAll('.blog-post.fade-in').forEach(el => {
            el.classList.add('visible');
          });
        });

      } catch (err) {
        console.error('Blog load error:', err);
        container.innerHTML = `
          <div class="blog-error">
            <p>😔 לא הצלחתי לטעון את הפוסטים</p>
            <p style="margin-top:0.5rem; font-size:0.85rem; opacity:0.7;">נסו לרענן את הדף</p>
          </div>`;
      }
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadBlog();
  </script>
</body>
</html>
