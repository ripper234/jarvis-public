<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tilt Earth Pong</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #020617;
      --bg2: #0f172a;
      --line: rgba(255,255,255,0.18);
      --text: #e2e8f0;
      --accent: #7dd3fc;
      --earth-size: min(42vw, 42vh, 260px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(59, 130, 246, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      color: var(--text);
      touch-action: none;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }

    .score {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .panel {
      max-width: min(64vw, 360px);
      text-align: right;
      font-size: clamp(12px, 2.8vw, 14px);
      opacity: 0.9;
    }

    .controls {
      position: fixed;
      inset: auto 0 max(12px, env(safe-area-inset-bottom, 12px)) 0;
      display: flex;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(15, 23, 42, 0.86);
      color: white;
      font: inherit;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="score" id="score">0 : 0</div>
    <div class="panel" id="status">Tilt phone to move. Desktop: ↑ and ↓ keys.</div>
  </div>
  <div class="controls">
    <button id="motionButton" hidden>Enable motion controls</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const statusEl = document.getElementById('status');
    const motionButton = document.getElementById('motionButton');

    const state = {
      width: 0,
      height: 0,
      player: { x: 24, y: 0, w: 14, h: 110, speed: 560 },
      ai: { x: 0, y: 0, w: 14, h: 110, speed: 360 },
      ball: { x: 0, y: 0, vx: 320, vy: 180, r: 10, speedCap: 880 },
      score: { player: 0, ai: 0 },
      keys: { up: false, down: false },
      inputMode: 'keyboard',
      tiltReady: false,
      tiltValue: 0,
      motionSupported: false,
      motionArmed: false,
      motionSeen: false,
      motionSource: '',
      tiltCenterBeta: null,
      tiltCenterGamma: null,
      accelCenterX: null,
      accelCenterY: null,
      pointerActive: false,
      lastTime: 0,
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      canvas.width = Math.floor(state.width * dpr);
      canvas.height = Math.floor(state.height * dpr);
      canvas.style.width = state.width + 'px';
      canvas.style.height = state.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state.ai.x = state.width - state.ai.w - 24;
      state.player.y = clamp(state.player.y || (state.height - state.player.h) / 2, 0, state.height - state.player.h);
      state.ai.y = clamp(state.ai.y || (state.height - state.ai.h) / 2, 0, state.height - state.ai.h);
      if (!state.lastTime) resetBall(Math.random() > 0.5 ? 1 : -1);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetBall(direction = 1) {
      state.ball.x = state.width / 2;
      state.ball.y = state.height / 2;
      const angle = (Math.random() * 1.2 - 0.6);
      const speed = 360;
      state.ball.vx = Math.cos(angle) * speed * direction;
      state.ball.vy = Math.sin(angle) * speed;
    }

    function reflectFromPaddle(paddle, goesRight) {
      const relative = (state.ball.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
      const clamped = clamp(relative, -1, 1);
      const speed = Math.min(Math.hypot(state.ball.vx, state.ball.vy) * 1.04, state.ball.speedCap);
      const angle = clamped * 1.05;
      state.ball.vx = Math.cos(angle) * speed * (goesRight ? 1 : -1);
      state.ball.vy = Math.sin(angle) * speed;
    }

    function updatePlayer(dt) {
      if (state.pointerActive || state.inputMode === 'tilt') {
        const targetY = clamp((state.tiltValue + 1) * 0.5 * (state.height - state.player.h), 0, state.height - state.player.h);
        const blend = state.pointerActive ? 1 : Math.min(1, dt * 8);
        state.player.y += (targetY - state.player.y) * blend;
      } else {
        let dir = 0;
        if (state.keys.up) dir -= 1;
        if (state.keys.down) dir += 1;
        state.player.y = clamp(state.player.y + dir * state.player.speed * dt, 0, state.height - state.player.h);
      }
    }

    function updateAI(dt) {
      const target = state.ball.y - state.ai.h / 2;
      const delta = target - state.ai.y;
      const step = clamp(delta, -state.ai.speed * dt, state.ai.speed * dt);
      state.ai.y = clamp(state.ai.y + step, 0, state.height - state.ai.h);
    }

    function updateBall(dt) {
      state.ball.x += state.ball.vx * dt;
      state.ball.y += state.ball.vy * dt;

      if (state.ball.y - state.ball.r <= 0 && state.ball.vy < 0) {
        state.ball.y = state.ball.r;
        state.ball.vy *= -1;
      }
      if (state.ball.y + state.ball.r >= state.height && state.ball.vy > 0) {
        state.ball.y = state.height - state.ball.r;
        state.ball.vy *= -1;
      }

      const playerHit =
        state.ball.x - state.ball.r <= state.player.x + state.player.w &&
        state.ball.x > state.player.x &&
        state.ball.y >= state.player.y &&
        state.ball.y <= state.player.y + state.player.h;

      const aiHit =
        state.ball.x + state.ball.r >= state.ai.x &&
        state.ball.x < state.ai.x + state.ai.w &&
        state.ball.y >= state.ai.y &&
        state.ball.y <= state.ai.y + state.ai.h;

      if (playerHit && state.ball.vx < 0) {
        state.ball.x = state.player.x + state.player.w + state.ball.r;
        reflectFromPaddle(state.player, true);
      }

      if (aiHit && state.ball.vx > 0) {
        state.ball.x = state.ai.x - state.ball.r;
        reflectFromPaddle(state.ai, false);
      }

      if (state.ball.x + state.ball.r < 0) {
        state.score.ai += 1;
        resetBall(1);
      } else if (state.ball.x - state.ball.r > state.width) {
        state.score.player += 1;
        resetBall(-1);
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, state.width, state.height);

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 4;
      ctx.setLineDash([14, 14]);
      ctx.beginPath();
      ctx.moveTo(state.width / 2, 0);
      ctx.lineTo(state.width / 2, state.height);
      ctx.stroke();
      ctx.restore();

      const size = Math.min(state.width * 0.42, state.height * 0.42, 260);
      const ex = state.width / 2;
      const ey = state.height / 2;
      const radius = size / 2;

      const ocean = ctx.createRadialGradient(ex - radius * 0.3, ey - radius * 0.35, radius * 0.16, ex, ey, radius);
      ocean.addColorStop(0, 'rgba(125, 211, 252, 0.38)');
      ocean.addColorStop(0.5, 'rgba(14, 116, 144, 0.32)');
      ocean.addColorStop(1, 'rgba(8, 47, 73, 0.06)');
      ctx.fillStyle = ocean;
      ctx.beginPath();
      ctx.arc(ex, ey, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.clip();
      ctx.fillStyle = 'rgba(74, 222, 128, 0.28)';
      blob(ex - radius * 0.25, ey - radius * 0.1, radius * 0.28, 5);
      blob(ex + radius * 0.18, ey - radius * 0.22, radius * 0.18, 6);
      blob(ex + radius * 0.05, ey + radius * 0.22, radius * 0.24, 7);
      ctx.restore();
    }

    function blob(cx, cy, base, bumps) {
      ctx.beginPath();
      for (let i = 0; i <= bumps; i++) {
        const t = (i / bumps) * Math.PI * 2;
        const r = base * (0.82 + 0.25 * Math.sin(i * 1.7));
        const x = cx + Math.cos(t) * r;
        const y = cy + Math.sin(t) * r * 0.72;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawPaddle(paddle, color) {
      ctx.fillStyle = color;
      roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 10);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawBall() {
      const glow = ctx.createRadialGradient(state.ball.x - 3, state.ball.y - 3, 2, state.ball.x, state.ball.y, state.ball.r * 2.4);
      glow.addColorStop(0, 'rgba(255,255,255,0.95)');
      glow.addColorStop(1, 'rgba(125,211,252,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, state.ball.r * 2.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f8fafc';
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      drawBackground();
      drawPaddle(state.player, '#7dd3fc');
      drawPaddle(state.ai, '#fca5a5');
      drawBall();
      scoreEl.textContent = `${state.score.player} : ${state.score.ai}`;
    }

    function loop(time) {
      if (!state.lastTime) state.lastTime = time;
      const dt = Math.min((time - state.lastTime) / 1000, 0.033);
      state.lastTime = time;

      updatePlayer(dt);
      updateAI(dt);
      updateBall(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function normalizedTiltFromEvent(event) {
      const beta = typeof event.beta === 'number' ? event.beta : null;
      const gamma = typeof event.gamma === 'number' ? event.gamma : null;
      if (beta == null && gamma == null) return null;

      if (state.tiltCenterBeta == null && beta != null) state.tiltCenterBeta = beta;
      if (state.tiltCenterGamma == null && gamma != null) state.tiltCenterGamma = gamma;

      const deltaBeta = beta == null ? 0 : beta - state.tiltCenterBeta;
      const deltaGamma = gamma == null ? 0 : gamma - state.tiltCenterGamma;
      const dominant = Math.abs(deltaGamma) > Math.abs(deltaBeta) ? deltaGamma : deltaBeta;
      return clamp(dominant / 25, -1, 1);
    }

    function normalizedAccelerationFromEvent(event) {
      const accel = event.accelerationIncludingGravity;
      if (!accel) return null;

      const x = typeof accel.x === 'number' ? accel.x : null;
      const y = typeof accel.y === 'number' ? accel.y : null;
      if (x == null && y == null) return null;

      if (state.accelCenterX == null && x != null) state.accelCenterX = x;
      if (state.accelCenterY == null && y != null) state.accelCenterY = y;

      const deltaX = x == null ? 0 : x - state.accelCenterX;
      const deltaY = y == null ? 0 : y - state.accelCenterY;
      const dominant = Math.abs(deltaX) > Math.abs(deltaY) ? deltaX : -deltaY;
      return clamp(dominant / 4, -1, 1);
    }

    function activateMotionSignal(source, normalized) {
      if (normalized == null) return;
      const firstSeen = !state.motionSeen;
      state.motionSeen = true;
      state.motionSupported = true;
      state.motionSource = source;
      state.tiltValue = normalized;
      if (state.tiltReady && !state.pointerActive) state.inputMode = 'tilt';
      if (firstSeen && state.tiltReady) {
        motionButton.hidden = false;
        motionButton.textContent = 'Recenter tilt';
        setStatus(`Tilt active via ${source}. Tap Recenter tilt if needed.`);
      }
    }

    function armMotionControls() {
      state.motionArmed = true;
      state.tiltReady = true;
      state.inputMode = 'tilt';
      motionButton.hidden = false;
      motionButton.textContent = 'Recenter tilt';
      setStatus('Tilt armed. Move your phone. Drag or keys still work too.');

      window.setTimeout(() => {
        if (state.motionArmed && !state.motionSeen) {
          motionButton.hidden = false;
          motionButton.textContent = 'Retry motion controls';
          setStatus('No motion data yet. Disable orientation lock, allow motion access, or drag instead.');
        }
      }, 1500);
    }

    function enableMotion() {
      if (typeof DeviceOrientationEvent === 'undefined' && typeof DeviceMotionEvent === 'undefined') {
        setStatus('Motion sensors are unavailable here. Use keyboard or drag.');
        return;
      }

      state.motionSupported = true;
      motionButton.hidden = false;
      motionButton.textContent = 'Enable motion controls';
      setStatus('Tap Enable motion controls, then tilt your phone. Drag also works.');

      motionButton.onclick = async () => {
        state.motionSeen = false;
        state.motionSource = '';
        state.tiltCenterBeta = null;
        state.tiltCenterGamma = null;
        state.accelCenterX = null;
        state.accelCenterY = null;

        const needsPermission =
          (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') ||
          (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function');

        if (needsPermission) {
          try {
            const permissionFn =
              (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function')
                ? DeviceOrientationEvent.requestPermission
                : DeviceMotionEvent.requestPermission;
            const result = await permissionFn();
            if (result !== 'granted') {
              setStatus('Motion permission denied. Use keyboard or drag.');
              return;
            }
          } catch (error) {
            setStatus('Could not enable motion. Use keyboard or drag.');
            return;
          }
        }

        armMotionControls();
      };
    }

    window.addEventListener('deviceorientation', (event) => {
      activateMotionSignal('orientation', normalizedTiltFromEvent(event));
    });

    window.addEventListener('devicemotion', (event) => {
      activateMotionSignal('acceleration', normalizedAccelerationFromEvent(event));
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowUp') {
        state.keys.up = true;
        state.inputMode = 'keyboard';
      }
      if (event.key === 'ArrowDown') {
        state.keys.down = true;
        state.inputMode = 'keyboard';
      }
    });

    window.addEventListener('keyup', (event) => {
      if (event.key === 'ArrowUp') state.keys.up = false;
      if (event.key === 'ArrowDown') state.keys.down = false;
    });

    function updatePointer(clientY) {
      state.pointerActive = true;
      state.inputMode = 'pointer';
      state.tiltValue = clamp((clientY / state.height) * 2 - 1, -1, 1);
      setStatus('Pointer drag active. Mobile can also use tilt.');
    }

    canvas.addEventListener('pointerdown', (event) => {
      canvas.setPointerCapture(event.pointerId);
      updatePointer(event.clientY);
    });

    canvas.addEventListener('pointermove', (event) => {
      if (event.buttons) updatePointer(event.clientY);
    });

    canvas.addEventListener('pointerup', () => {
      state.pointerActive = false;
      setStatus(state.tiltReady ? 'Tilt controls active. Drag or keys still work too.' : 'Tap Enable motion controls, or use ↑ and ↓ keys.');
    });

    window.addEventListener('resize', resize);

    resize();
    enableMotion();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
